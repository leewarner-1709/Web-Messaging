<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Messaging Testing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header, footer {
            background-color: #333;
            color: white;
            padding: 1em;
            text-align: center;
        }
        nav {
            background-color: #f4f4f4;
            padding: 0.5em;

        }
        nav a {
            margin: 0 10px;
            color: #333;
            text-decoration: none;
        }
        main {

        }

<script type="text/javascript" charset="utf-8">
  // Define the Genesys script
  (function (g, e, n, es, ys) {
    g['_genesysJs'] = e;
    g[e] = g[e] || function () {
      (g[e].q = g[e].q || []).push(arguments)
    };
    g[e].t = 1 * new Date();
    g[e].c = es;
    ys = document.createElement('script'); ys.async = 1; ys.src = n; ys.charset = 'utf-8'; 
    document.head.appendChild(ys);
  })(window, 'Genesys', 'https://apps.mypurecloud.de/genesys-bootstrap/genesys.min.js', {
    environment: 'prod-euc1',
    deploymentId: 'bc3caef9-02a9-4410-97bc-7c2accf51aeb'
  });
  
  function toggleMessenger() {
    Genesys("command", "Messenger.open", {},
      function(o) { /* fulfilled callback */ },
      function(o) { // if rejected
        Genesys("command", "Messenger.close");
      }
    );
  }
        // Function to initialize Genesys with stored locale
        function initializeGenesys() {
            Genesys("command", "Database.set", {
                messaging: {
                    customAttributes: {
                        name: "GSD Systems Test",
                        locale: "en-GB",
                        webUserEmail: "GSDSystemsTester@ccemail.com"
                    }
                }
            });
        }

        window.onload = initializeGenesys;

</script>
