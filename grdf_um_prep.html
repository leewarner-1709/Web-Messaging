<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Messaging Testing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header, footer {
            background-color: #333;
            color: white;
            padding: 1em;
            text-align: center;
        }
        nav {
            background-color: #f4f4f4;
            padding: 0.5em;
            text-align: center;
        }
        nav a {
            margin: 0 10px;
            color: #333;
            text-decoration: none;
        }
        main {
            padding: 2em;
        }
    </style>
<script type="text/javascript" charset="utf-8">
  // Define the Genesys script
  (function (g, e, n, es, ys) {
    g['_genesysJs'] = e;
    g[e] = g[e] || function () {
      (g[e].q = g[e].q || []).push(arguments)
    };
    g[e].t = 1 * new Date();
    g[e].c = es;
    ys = document.createElement('script'); ys.async = 1; ys.src = n; ys.charset = 'utf-8'; 
    document.head.appendChild(ys);
  })(window, 'Genesys', 'https://apps.mypurecloud.de/genesys-bootstrap/genesys.min.js', {
    environment: 'prod-euc1',
    deploymentId: 'd675c134-9894-4794-96c8-b43d884a4674'
  });
  
  function toggleMessenger() {
    Genesys("command", "Messenger.open", {},
      function(o) { /* fulfilled callback */ },
      function(o) { // if rejected
        Genesys("command", "Messenger.close");
      }
    );
  }

 // Function to handle language change and email
        function changeLanguage(selectElement) {
            const selectedLocale = selectElement.value;
            localStorage.setItem("selectedLocale", selectedLocale);
            location.reload(); // Refresh the page
        }
            function changeEmail(selectElement) {
            const selectedEmail = emailSelect.value;
            localStorage.setItem("selectedEmail", selectedEmail);
            location.reload(); // Refresh the page
        }

        // Function to initialize Genesys with stored locale and email
        function initializeGenesys() {
            const locale = localStorage.getItem("selectedLocale") || "en-GB"; // Default to en-GB
            const email = localStorage.getItem("selectedEmail") || "GSDSystems@computacenter.com"; // Default to GSD Systems
            Genesys("command", "Database.set", {
                messaging: {
                    customAttributes: {
                        name: "GSD Systems Test",
                        locale: locale,
                        webUserEmail: email
                    }
                }
            });

            // Set dropdown to stored value
            document.getElementById("languageSelect").value = locale;
            document.getElementById("emailSelect").value = email;
        }

        window.onload = initializeGenesys;

</script>
</head>
<body>
    <header>
        <h1>Web Messaging Testing</h1><p></p>
    </header>
    <label for="languageSelect">Choose Language:</label>
    <select id="languageSelect" onchange="changeLanguage(this)">
        <option value="en-GB">English (UK)</option>
        <option value="fr-FR">Français (FR)</option>
        <option value="de-DE">Deutsch (DE)</option>
        <option value="es-ES">Espanol (ES)</option>
    </select>
    <br></br>
    <p>Enter email address (and then press TAB) : </p><input type="text" style="width:300px" id="emailSelect" onchange="changeEmail(this)"/>
</body>
</html>
