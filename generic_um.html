<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Messaging Testing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header, footer {
            background-color: #333;
            color: white;
            padding: 1em;
            text-align: center;
        }
        nav {
            background-color: #f4f4f4;
            padding: 0.5em;
            text-align: center;
        }
        nav a {
            margin: 0 10px;
            color: #333;
            text-decoration: none;
        }
        main {
            padding: 2em;
        }
    </style>
<script type="text/javascript" charset="utf-8">
  // Define the Genesys script
  (function (g, e, n, es, ys) {
    g['_genesysJs'] = e;
    g[e] = g[e] || function () {
      (g[e].q = g[e].q || []).push(arguments)
    };
    g[e].t = 1 * new Date();
    g[e].c = es;
    ys = document.createElement('script'); ys.async = 1; ys.src = n; ys.charset = 'utf-8'; 
    document.head.appendChild(ys); deployid = 'daafc71c-9565-49bf-9902-ff89f4849e29';
  })(window, 'Genesys', 'https://apps.mypurecloud.de/genesys-bootstrap/genesys.min.js', {
    environment: 'prod-euc1',
    deploymentId: deployid
  });
  
  function toggleMessenger() {
    Genesys("command", "Messenger.open", {},
      function(o) { /* fulfilled callback */ },
      function(o) { // if rejected
        Genesys("command", "Messenger.close");
      }
    );
  }

 // Function to handle language change and email
        function changeLanguage(selectElement) {
            const selectedLocale = selectElement.value;
            localStorage.setItem("selectedLocale", selectedLocale);
            location.reload(); // Refresh the page
        }
            function changeName(selectElement) {
            const selectedName = nameSelect.value;
            localStorage.setItem("selectedName", selectedName);
            location.reload(); // Refresh the page
        }
            function changeEmail(selectElement) {
            const selectedEmail = emailSelect.value;
            localStorage.setItem("selectedEmail", selectedEmail);
            location.reload(); // Refresh the page
        }
            function changeDeploymentID(selectElement) {
            const selectedDeploymentID = deploymentidSelect.value;
            localStorage.setItem("selectedDeploymentID", selectedDeploymentID);
            location.reload(); // Refresh the page
        }

        // Function to initialize Genesys with stored values
        function initializeGenesys() {
            const locale = localStorage.getItem("selectedLocale") || "en-GB"; // Default to en-GB
            const username = localStorage.getItem("selectedName") || "GSD Systems"; // Default to GSD Systems
            const email = localStorage.getItem("selectedEmail") || "GSDSystems@computacenter.com"; // Default to GSD Systems
            const deployid = localStorage.getItem("selectedDeploymentID") || "daafc71c-9565-49bf-9902-ff89f4849e29"; // Default to GSD Systems UM DEV
            Genesys("command", "Database.set", {
                messaging: {
                    customAttributes: {
                        name: username,
                        locale: locale,
                        webUserEmail: email
                    }
                }
            });

            // Set dropdown to stored value
            document.getElementById("languageSelect").value = locale;
            document.getElementById("nameSelect").value = username;
            document.getElementById("emailSelect").value = email;
            document.getElementById("deploymentidSelect").value = deployid;
        }

        window.onload = initializeGenesys;

  
</script>
</head>
<body>
    <header>
        <h1>Web Messaging Testing</h1><h2>Generic template</h2><p></p>
    </header>
    <label for="languageSelect">Choose Language:</label>
    <select id="languageSelect" onchange="changeLanguage(this)">
        <option value="en-GB">English (UK)</option>
        <option value="fr-FR">Français (FR)</option>
        <option value="de-DE">Deutsch (DE)</option>
        <option value="es-ES">Espanol (ES)</option>
    </select>
    <br></br>
    <p>Enter name : </p><input type="text" style="width:300px" id="nameSelect" onchange="changeName(this)"/>
    <p>Enter email address : </p><input type="text" style="width:300px" id="emailSelect" onchange="changeEmail(this)"/>
    <p>Enter deploymentID (and then press TAB) : </p><input type="text" style="width:300px" id="deploymentidSelect" onchange="changeDeploymentID(this)"/>
</body>
</html>
